# Ajuste mínimo Supabase — esquema completo en Fase 1
# Docs: https://supabase.com/docs/guides/cli/config

project_id = "inventario-activos"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "10MiB"

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = [
  "http://localhost:3000/auth/callback",
  "http://localhost:5173/auth/callback",
  "http://localhost:54324/auth/callback",
  "http://127.0.0.1:54324/auth/callback",
  "pe.bdconsultores.inventario://auth/callback",
  "https://bdconsultores.vercel.app/auth/callback",
  "https://bdconsultores.vercel.app/auth/desktop-bridge"
]
jwt_expiry = 3600
enable_signup = false

[auth.email]
enable_signup = false
enable_confirmations = false

[auth.email.template.invite]
subject = "B&D Consultores — Invitación al Inventario de Activos Fijos"
content_path = "./templates/invite.html"

[auth.email.template.magic_link]
subject = "B&D Consultores — Acceso al Inventario de Activos Fijos"
content_path = "./templates/magic-link.html"
