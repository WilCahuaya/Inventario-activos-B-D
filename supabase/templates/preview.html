<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vista previa — Invitación B&amp;D</title>
  <style>
    body { margin: 0; background: #c5d8e2; }
    .preview-bar {
      position: sticky; top: 0; z-index: 10;
      display: flex; flex-wrap: wrap; gap: 8px; align-items: center; justify-content: center;
      padding: 12px 16px;
      background: #1c2d37; color: #e2ecef;
      font-family: 'Segoe UI', Roboto, sans-serif; font-size: 13px;
    }
    .preview-bar button {
      border: 0; border-radius: 6px; padding: 8px 14px; cursor: pointer;
      font: inherit; font-weight: 600;
    }
    .preview-bar .active { background: #3a91b5; color: #fff; }
    .preview-bar .idle { background: #2a3d48; color: #c5d8e2; }
    iframe { display: block; width: 100%; height: calc(100vh - 48px); border: 0; background: #edf4f8; }
  </style>
</head>
<body>
  <div class="preview-bar">
    Vista previa ·
    <button type="button" class="active" id="btn-admin">Admin entidad</button>
    <button type="button" class="idle" id="btn-contador">Contador</button>
    <button type="button" class="idle" id="btn-magic">Magic Link</button>
  </div>
  <iframe id="frame" title="Plantilla de correo"></iframe>

  <script>
    const shell = (bodyInner) => `<!DOCTYPE html>
<html lang="es">
<head>

</head>
<body style="margin:0;padding:0;background-color:#edf4f8;font-family:Georgia,'Times New Roman',serif;color:#1c2d37;-webkit-font-smoothing:antialiased;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background-color:#edf4f8;padding:48px 16px;">
    <tr>

          </tr>

                <tr>
                  <td style="width:48px;height:48px;border-radius:12px;background-color:#3a91b5;text-align:center;vertical-align:middle;">
                    <span style="display:inline-block;font-family:Georgia,'Times New Roman',serif;font-size:18px;font-weight:700;color:#ffffff;line-height:48px;">B&amp;D</span>
                  </td>
                </tr>
              </table>
              <p style="margin:0 0 4px;font-family:'Segoe UI',Roboto,sans-serif;font-size:13px;font-weight:700;letter-spacing:0.16em;text-transform:uppercase;color:#3a91b5;">
                B&amp;D Consultores Global EIRL
              </p>

                Estudio contable · Asesoría tributaria y patrimonial
              </p>
            </td>
          </tr>
          <tr>
            <td style="padding:36px 40px 32px;">
              ${bodyInner}
              <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="margin:0 0 32px;background-color:#f4f9fc;border:1px solid #dceaf1;border-radius:10px;">
                <tr>
                  <td style="padding:24px 26px;">
                    <p style="margin:0 0 18px;font-family:'Segoe UI',Roboto,sans-serif;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:#3a91b5;">Cómo ingresar</p>
                    <p style="margin:0 0 8px;font-family:'Segoe UI',Roboto,sans-serif;font-size:14px;line-height:1.55;color:#1c2d37;"><strong style="color:#3a91b5;">1.</strong> Pulse el botón para confirmar su acceso.</p>
                    <p style="margin:0 0 8px;font-family:'Segoe UI',Roboto,sans-serif;font-size:14px;line-height:1.55;color:#1c2d37;"><strong style="color:#3a91b5;">2.</strong> Inicie sesión con su cuenta de <strong>Google</strong>.</p>
                    <p style="margin:0;font-family:'Segoe UI',Roboto,sans-serif;font-size:14px;line-height:1.55;color:#1c2d37;"><strong style="color:#3a91b5;">3.</strong> Use el mismo correo al que se envió esta invitación.</p>
                  </td>
                </tr>
              </table>
              <table role="presentation" cellspacing="0" cellpadding="0" style="margin:0 auto 20px;">
                <tr>
                  <td style="border-radius:8px;background-color:#3a91b5;">
                    <a href="#" style="display:inline-block;padding:16px 40px;font-family:'Segoe UI',Roboto,sans-serif;font-size:15px;font-weight:600;color:#ffffff;text-decoration:none;border-radius:8px;">
                      Aceptar invitación e ingresar
                    </a>
                  </td>
                </tr>
              </table>
              <p style="margin:0;font-family:'Segoe UI',Roboto,sans-serif;font-size:12px;color:#8fa3ad;text-align:center;">
                Enlace de un solo uso · Válido por tiempo limitado
              </p>
            </td>
          </tr>
          <tr>
            <td style="padding:24px 40px 28px;border-top:1px solid #e5eef3;background-color:#f4f9fc;">
              <p style="margin:0 0 4px;font-family:'Segoe UI',Roboto,sans-serif;font-size:13px;font-weight:700;color:#1c2d37;">B&amp;D Consultores Global EIRL</p>
              <p style="margin:0 0 14px;font-family:'Segoe UI',Roboto,sans-serif;font-size:12px;color:#5a7380;">RUC 20614326418 · Inventario de Activos Fijos</p>
              <p style="margin:0;font-family:'Segoe UI',Roboto,sans-serif;font-size:11px;color:#8fa3ad;">Correo enviado a cliente@empresa.com. Mensaje confidencial.</p>
            </td>
          </tr>
        </table>
        <p style="margin:20px 0 0;font-family:'Segoe UI',Roboto,sans-serif;font-size:11px;color:#8fa3ad;text-align:center;">
          <a href="https://bdconsultores.org" style="color:#3a91b5;text-decoration:none;">bdconsultores.org</a>
        </p>

    </tr>
  </table>
</body>
</html>`;

    const adminBody = `
      <p style="margin:0 0 8px;font-family:'Segoe UI',Roboto,sans-serif;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.12em;color:#3a91b5;">
        Inventario de Activos Fijos · Administrador
      </p>
      <h1 style="margin:0 0 22px;font-family:Georgia,'Times New Roman',serif;font-size:26px;font-weight:400;line-height:1.3;color:#1c2d37;">
        Está invitado a acceder a la plataforma
      </h1>
      <p style="margin:0 0 16px;font-family:'Segoe UI',Roboto,sans-serif;font-size:15px;line-height:1.7;color:#5a7380;">
        Estimado(a) María Pérez,
      </p>
      <p style="margin:0 0 28px;font-family:'Segoe UI',Roboto,sans-serif;font-size:15px;line-height:1.7;color:#5a7380;">
        <strong style="color:#1c2d37;">B&amp;D Consultores Global EIRL</strong>
        le ha registrado como
        <strong style="color:#1c2d37;">administrador de entidad</strong>
        de <strong style="color:#1c2d37;">Municipalidad Ejemplo</strong>
        en nuestro sistema de control e inventario de activos fijos.
      </p>`;

    const contadorBody = `
      <p style="margin:0 0 8px;font-family:'Segoe UI',Roboto,sans-serif;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.12em;color:#3a91b5;">
        Inventario de Activos Fijos · Contador
      </p>
      <h1 style="margin:0 0 22px;font-family:Georgia,'Times New Roman',serif;font-size:26px;font-weight:400;line-height:1.3;color:#1c2d37;">
        Está invitado a acceder a la plataforma
      </h1>
      <p style="margin:0 0 16px;font-family:'Segoe UI',Roboto,sans-serif;font-size:15px;line-height:1.7;color:#5a7380;">
        Estimado(a) Carlos Ruiz,
      </p>
      <p style="margin:0 0 28px;font-family:'Segoe UI',Roboto,sans-serif;font-size:15px;line-height:1.7;color:#5a7380;">
        <strong style="color:#1c2d37;">B&amp;D Consultores Global EIRL</strong>
        le ha registrado como
        <strong style="color:#1c2d37;">contador</strong>
        en nuestro sistema de control e inventario de activos fijos.
      </p>`;

    const magicBody = `
      <p style="margin:0 0 8px;font-family:'Segoe UI',Roboto,sans-serif;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.12em;color:#3a91b5;">
        Inventario de Activos Fijos
      </p>
      <h1 style="margin:0 0 22px;font-family:Georgia,'Times New Roman',serif;font-size:26px;font-weight:400;line-height:1.3;color:#1c2d37;">
        Enlace de acceso seguro
      </h1>
      <p style="margin:0 0 28px;font-family:'Segoe UI',Roboto,sans-serif;font-size:15px;line-height:1.7;color:#5a7380;">
        Hemos recibido una solicitud para acceder a la plataforma de
        <strong style="color:#1c2d37;">B&amp;D Consultores Global EIRL</strong>.
        Utilice el botón inferior para continuar de forma segura.
      </p>`;

    const frame = document.getElementById('frame');
    const buttons = {
      admin: document.getElementById('btn-admin'),
      contador: document.getElementById('btn-contador'),
      magic: document.getElementById('btn-magic'),
    };

    function show(key) {
      const bodies = { admin: adminBody, contador: contadorBody, magic: magicBody };
      frame.srcdoc = shell(bodies[key]);
      Object.entries(buttons).forEach(([k, btn]) => {
        btn.className = k === key ? 'active' : 'idle';
      });
    }

    buttons.admin.onclick = () => show('admin');
    buttons.contador.onclick = () => show('contador');
    buttons.magic.onclick = () => show('magic');
    show('admin');
  </script>
</body>
</html>
